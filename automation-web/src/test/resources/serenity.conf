serenity {
  project.name = "Serenity Screenplay - SauceDemo"
  take.screenshots = FOR_FAILURES
  console.colors = true

  step.delay = 1000
}

webdriver {
  driver = "chrome"
  base.url = "https://www.saucedemo.com/"
  chrome.driver = "C:/Drivers/chromedriver.exe"

  timeouts {
    implicitlywait = 3000
  }

  wait.for.timeout = 8000
}

chrome.switches = """--start-maximized;
--test-type;
--no-sandbox;
--ignore-certificate-errors;
--window-size=1920,1080;
--disable-save-password-bubble;
--disable-notifications;
--disable-infobars;
--disable-extensions;"""

headless.mode = false